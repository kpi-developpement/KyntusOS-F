# ===============================
# DATABASE CONFIGURATION (Hybrid: Local + Docker/Prod)
# ===============================
# Logic: "Chouf l ENV variable, ila mal9itihach, khdem b localhost + Turbo Batching"
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kyntus_db?reWriteBatchedInserts=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:waeloujdiastral481123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIBERNATE & JPA
# ===============================
# Create/Update tables automatically
spring.jpa.hibernate.ddl-auto=update
# Explicit Dialect (Bach Spring ye3ref rah khdam m3a Postgres)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGS & PERFORMANCE OPTIMIZATION
# ===============================
# Khasshom ykouno false w ERROR bach ma y-crashich l PC f 160k lignes
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR

# ===============================
# SERVER CONFIGURATION
# ===============================
# Par defaut 8080 (Li kyn f Dockerfile), avec variable d env au cas ou
server.port=${SERVER_PORT:8080}

# ===============================
# MULTIPART / UPLOAD LIMITS
# ===============================
# Limit d importation l fichiers kbar
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB